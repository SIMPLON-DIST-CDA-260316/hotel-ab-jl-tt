name: Bug Report
description: Signaler un bug
title: "[BUG] "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description du bug
      description: Description claire et concise du problème
      placeholder: "Quand je fais X, il se passe Y au lieu de Z"
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Étapes pour reproduire
      description: Les étapes pour reproduire le bug
      placeholder: |
        1. Aller sur '...'
        2. Cliquer sur '...'
        3. Observer l'erreur
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
      placeholder: "Ce qui devrait se passer"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportement actuel
      placeholder: "Ce qui se passe réellement"
    validations:
      required: true

  - type: dropdown
    id: severity
    attributes:
      label: Sévérité
      options:
        - Bloquant
        - Majeur
        - Mineur
        - Cosmétique
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Contexte
      description: Navigateur, OS, captures d'écran, logs...
