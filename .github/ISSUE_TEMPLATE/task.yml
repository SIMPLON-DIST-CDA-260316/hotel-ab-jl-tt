name: Task
description: Tâche technique (setup, refacto, CI, documentation...)
title: "[TASK] "
labels: ["task"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Que faut-il faire et pourquoi ?
    validations:
      required: true

  - type: textarea
    id: checklist
    attributes:
      label: Checklist
      description: Sous-tâches à réaliser
      placeholder: |
        - [ ] Étape 1
        - [ ] Étape 2
        - [ ] Étape 3
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priorité
      options:
        - Haute
        - Moyenne
        - Basse
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: Notes / Références
      description: Liens, documentation, dépendances...
